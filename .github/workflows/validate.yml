name: Validate

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  hacs:
    name: HACS-Validierung
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: HACS validation (category plugin)
        uses: hacs/action@main
        with:
          category: plugin
          ignore: "images"

  syntax:
    name: JS-Syntaxcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: node --check auf alle Karten-JS
        run: |
          for f in *.js; do
            echo "Prüfe $f"
            node --check "$f"
          done

